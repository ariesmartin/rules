[custom]
; Aries OpenClash / Mihomo subscription conversion template
; Target: SUBAPI / subconverter -> Mihomo/OpenClash
; Rule source policy:
; - Prefer mature MetaCubeX .mrs rule-sets with explicit clash-domain/clash-ipcidr type.
; - Use clash-classic only for small custom supplements or providers that are classical lists.
; - EDHK/EDUS are primary nodes by policy group order. CC/CCUS remain backup candidates.
; - Automation should update subscriptions/nodes, not force scene policy selections.

; ---------------------------------------------------------------------------
; Rules: order matters. Specific direct/download/media/AI/game rules first.
; ---------------------------------------------------------------------------

; Local/private/direct
ruleset=🇨🇳 国内直连,clash-domain:https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/private.mrs,86400
ruleset=🇨🇳 国内直连,clash-ipcidr:https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/private.mrs,86400
