# Aries Mihomo / OpenClash native configuration.
# This file intentionally uses native rule-providers with format: mrs.
# Node subscriptions are pulled from the local LXC aggregator, so no EDHK/EDUS
# tokens are stored in this public repository.

proxy-providers:
  NodeBench-Edge:
    type: http
    url: "http://192.168.2.60:8080/EDGE"
    interval: 600
    proxy: 直连
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 180
      timeout: 5000
      lazy: true

proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

mixed-port: 7893
redir-port: 7892
tproxy-port: 7895
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
keep-alive-idle: 600
keep-alive-interval: 15

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

tun:
  enable: true
  stack: gvisor
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false
  strict-route: false

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
    - "+.lan"
    - "+.local"
    - "+.push.apple.com"
    - "time.*.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

proxy-groups:
  - {name: 🌍 默认代理, type: select, proxies: [🌐 视频优选, ⬇️ 下载稳定, 🇸🇬 新加坡故转, 🇯🇵 日本故转, 🇹🇼 台湾故转, 🇭🇰 香港故转, 🇺🇸 美国故转, ✨ 全部智选, 🧰 全部手选, 直连, 拒绝]}
  - {name: ⬇️ 下载稳定, type: select, proxies: [⚡ 下载故转, 🇸🇬 新加坡故转, 🇯🇵 日本故转, 🇹🇼 台湾故转, 🇺🇸 美国故转, 🇭🇰 香港故转, ✨ 全部智选, 🧰 全部手选, 直连]}
  - {name: 📺 YouTube, type: select, proxies: [🌐 视频优选, 🇸🇬 新加坡故转, 🇯🇵 日本故转, 🇹🇼 台湾故转, 🇭🇰 香港故转, 🇺🇸 美国故转, ✨ 全部智选, 🧰 全部手选, 直连]}
  - {name: 🎶 TikTok, type: select, proxies: [🌐 视频优选, 🇸🇬 新加坡故转, 🇯🇵 日本故转, 🇹🇼 台湾故转, 🇭🇰 香港故转, 🇺🇸 美国故转, ✨ 全部智选, 🧰 全部手选, 直连]}
  - {name: 🇬 Google 服务, type: select, proxies: [🇺🇸 美国故转, 🇸🇬 新加坡故转, 🇭🇰 香港故转, ⬇️ 下载稳定, 🌐 视频优选, 🧰 全部手选, 直连]}
  - {name: 🤖 ChatGPT, type: select, proxies: [🇺🇸 美国故转, 🇸🇬 新加坡故转, 🇯🇵 日本故转, 🇭🇰 香港故转, ✨ 全部智选, 🧰 全部手选]}
  - {name: 🤖 AI 其他, type: select, proxies: [🇺🇸 美国故转, 🇸🇬 新加坡故转, 🇯🇵 日本故转, 🇭🇰 香港故转, ✨ 全部智选, 🧰 全部手选]}
  - {name: 🎮 游戏服务, type: select, proxies: [🎮 游戏稳定, 🇺🇸 美国故转, 🇯🇵 日本故转, 🇸🇬 新加坡故转, 🇭🇰 香港故转, 🧰 全部手选, 直连]}
  - {name: 🎮 Steam 下载, type: select, proxies: [直连, ⬇️ 下载稳定, 🎮 游戏稳定, 🇺🇸 美国故转, 🇯🇵 日本故转, 🇸🇬 新加坡故转, 🧰 全部手选]}
  - {name: 🎬 流媒体, type: select, proxies: [🌐 视频优选, 📺 YouTube, 🇸🇬 新加坡故转, 🇯🇵 日本故转, 🇹🇼 台湾故转, 🇭🇰 香港故转, 🇺🇸 美国故转, ✨ 全部智选, 🧰 全部手选]}
  - {name: 🍎 Apple, type: select, proxies: [直连, 🌍 默认代理, 🇭🇰 香港故转, 🇺🇸 美国故转, 🧰 全部手选]}
  - {name: 🪟 Microsoft, type: select, proxies: [直连, ⬇️ 下载稳定, 🌍 默认代理, 🇺🇸 美国故转, 🧰 全部手选]}
  - {name: ₿ 加密金融, type: select, proxies: [🇭🇰 香港故转, 🇺🇸 美国故转, 🇸🇬 新加坡故转, 🌍 默认代理, 🧰 全部手选]}
  - {name: 🧭 其他兜底, type: select, proxies: [🌍 默认代理, 🌐 视频优选, ⬇️ 下载稳定, 🇸🇬 新加坡故转, 🇭🇰 香港故转, 🇺🇸 美国故转, 直连, 拒绝, 🧰 全部手选]}

  - {name: ⚡ 下载故转, type: fallback, proxies: [🇸🇬 新加坡故转, 🇯🇵 日本故转, 🇹🇼 台湾故转, 🇺🇸 美国故转, 🇭🇰 香港故转], url: "https://github.com", interval: 180, timeout: 5000, lazy: false}
  - {name: 🌐 视频优选, type: url-test, use: [NodeBench-Edge], filter: "^(?!.*(直连|拒绝)).*$", url: "https://www.gstatic.com/generate_204", interval: 240, tolerance: 80, timeout: 5000}
  - {name: 🎮 游戏稳定, type: fallback, proxies: [🇺🇸 美国故转, 🇯🇵 日本故转, 🇸🇬 新加坡故转, 🇭🇰 香港故转, 🇹🇼 台湾故转], url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000, lazy: false}
  - {name: ✨ 全部智选, type: url-test, use: [NodeBench-Edge], filter: "^(?!.*(直连|拒绝)).*$", url: "https://www.gstatic.com/generate_204", interval: 300, tolerance: 100, timeout: 5000}
  - {name: 🧰 全部手选, type: select, use: [NodeBench-Edge], proxies: [直连, 拒绝]}

  - {name: 🇭🇰 香港故转, type: fallback, proxies: [🇭🇰 ED香港故转, 🇭🇰 CC香港故转], url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000, lazy: false}
  - {name: 🇸🇬 新加坡故转, type: fallback, proxies: [🇸🇬 ED新加坡故转, 🇸🇬 CC新加坡故转], url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000, lazy: false}
  - {name: 🇯🇵 日本故转, type: fallback, proxies: [🇯🇵 ED日本故转, 🇯🇵 CC日本故转], url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000, lazy: false}
  - {name: 🇹🇼 台湾故转, type: fallback, proxies: [🇹🇼 ED台湾故转, 🇹🇼 CC台湾故转], url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000, lazy: false}
  - {name: 🇺🇸 美国故转, type: fallback, proxies: [🇺🇸 ED美国故转, 🇺🇸 CC美国故转], url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000, lazy: false}

  - {name: 🇭🇰 ED香港故转, type: fallback, use: [NodeBench-Edge], filter: "(?=.*EDHK)(?=.*(香港|港|HK|Hong Kong|HongKong)).*", url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000}
  - {name: 🇸🇬 ED新加坡故转, type: fallback, use: [NodeBench-Edge], filter: "(?=.*EDHK)(?=.*(新加坡|狮城|SG|Singapore)).*", url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000}
  - {name: 🇯🇵 ED日本故转, type: fallback, use: [NodeBench-Edge], filter: "(?=.*EDHK)(?=.*(日本|东京|大阪|JP|Japan)).*", url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000}
  - {name: 🇹🇼 ED台湾故转, type: fallback, use: [NodeBench-Edge], filter: "(?=.*EDHK)(?=.*(台湾|台灣|台北|TW|Taiwan)).*", url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000}
  - {name: 🇺🇸 ED美国故转, type: fallback, use: [NodeBench-Edge], filter: "(?=.*EDUS)(?=.*(美国|美|US|United States|UnitedStates)).*", url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000}

  - {name: 🇭🇰 CC香港故转, type: fallback, use: [NodeBench-Edge], filter: "^(?!.*EDHK)(?=.*CC)(?=.*(香港|港|HK|Hong Kong|HongKong)).*", url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000}
  - {name: 🇸🇬 CC新加坡故转, type: fallback, use: [NodeBench-Edge], filter: "^(?!.*EDHK)(?=.*CC)(?=.*(新加坡|狮城|SG|Singapore)).*", url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000}
  - {name: 🇯🇵 CC日本故转, type: fallback, use: [NodeBench-Edge], filter: "^(?!.*EDHK)(?=.*CC)(?=.*(日本|东京|大阪|JP|Japan)).*", url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000}
  - {name: 🇹🇼 CC台湾故转, type: fallback, use: [NodeBench-Edge], filter: "^(?!.*EDHK)(?=.*CC)(?=.*(台湾|台灣|台北|TW|Taiwan)).*", url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000}
  - {name: 🇺🇸 CC美国故转, type: fallback, use: [NodeBench-Edge], filter: "^(?!.*EDUS)(?=.*CCUS)(?=.*(美国|美|US|United States|UnitedStates)).*", url: "https://www.gstatic.com/generate_204", interval: 180, timeout: 5000}

  - {name: 🇭🇰 香港手选, type: select, use: [NodeBench-Edge], filter: "(香港|港|HK|Hong Kong|HongKong)"}
  - {name: 🇸🇬 新加坡手选, type: select, use: [NodeBench-Edge], filter: "(新加坡|狮城|SG|Singapore)"}
  - {name: 🇯🇵 日本手选, type: select, use: [NodeBench-Edge], filter: "(日本|东京|大阪|JP|Japan)"}
  - {name: 🇹🇼 台湾手选, type: select, use: [NodeBench-Edge], filter: "(台湾|台灣|台北|TW|Taiwan)"}
  - {name: 🇺🇸 美国手选, type: select, use: [NodeBench-Edge], filter: "(美国|美|US|United States|UnitedStates)"}

